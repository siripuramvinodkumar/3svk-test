<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - 3SVK</title>
</head>
<body>
    <h2>Sign in to 3SVK</h2>
    <!-- Dynamic button that changes based on auth state -->
    <button id="authButton" onclick="handleAuth()">Sign in with Google</button>
    <p id="userInfo"></p>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBbTBZlAA9sprHmHYIrOL9Ct1yBU8_gVOU",
            authDomain: "svk-auth.firebaseapp.com",
            projectId: "svk-auth",
            storageBucket: "svk-auth.firebasestorage.app",
            messagingSenderId: "178863251618",
            appId: "1:178863251618:web:21f1f549a2f11f76d1f7fb",
            measurementId: "G-C5E85C5C09"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const authButton = document.getElementById("authButton");
        const userInfo = document.getElementById("userInfo");

        // Handle redirect result after Google returns user back
        getRedirectResult(auth).catch((error) => {
            console.error("Login Redirect Error: ", error.message);
        });

        // Listen for user login/logout state changes live on the page
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is signed in -> Show Logout option and user info
                authButton.innerText = "Logout";
                userInfo.innerText = "Logged in as: " + (user.displayName || user.email);
            } else {
                // User is signed out -> Show Sign-in option
                authButton.innerText = "Sign in with Google";
                userInfo.innerText = "";
            }
        });

        // Unified button click handler for both Login and Logout
        window.handleAuth = function() {
            if (auth.currentUser) {
                // If logged in, perform logout
                signOut(auth).then(() => {
                    alert("Logged out successfully.");
                }).catch((error) => {
                    console.error("Logout Error: ", error);
                });
            } else {
                // If logged out, start Google Sign-in redirect
                signInWithRedirect(auth, provider);
            }
        };
    </script>
</body>
</html>
