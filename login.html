<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - 3SVK</title>
</head>
<body>
    <h2>Sign in to 3SVK</h2>
    <button id="authButton" onclick="handleAuth()">Sign in with Google</button>
    <p id="userInfo"></p>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBbTBZlAA9sprHmHYIrOL9Ct1yBU8_gVOU",
            authDomain: "svk-auth.firebaseapp.com",
            projectId: "svk-auth",
            storageBucket: "svk-auth.firebasestorage.app",
            messagingSenderId: "178863251618",
            appId: "1:178863251618:web:21f1f549a2f11f76d1f7fb",
            measurementId: "G-C5E85C5C09"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const authButton = document.getElementById("authButton");
        const userInfo = document.getElementById("userInfo");

        // 1. Handle incoming redirect response from Google
        getRedirectResult(auth)
            .then((result) => {
                if (result) {
                    // Successfully authenticated via redirect, send to dashboard
                    window.location.href = "study.html";
                }
            })
            .catch((error) => {
                console.error("Login Redirect Error: ", error.message);
                alert("Login failed: " + error.message);
            });

        // 2. Check if a session already exists; if so, redirect straight to dashboard
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // If they are visiting login.html directly while logged in, forward them to study.html
                // (Remove or comment out the line below if you prefer letting them see a logout button on login.html instead)
                window.location.href = "study.html";
            }
        });

        // 3. Trigger Google Sign-In redirect
        window.handleAuth = function() {
            signInWithRedirect(auth, provider);
        };
    </script>
</body>
</html>
