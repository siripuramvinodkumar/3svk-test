<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - 3SVK</title>
</head>
<body>
    <h2>Sign in to 3SVK</h2>
    <button onclick="loginWithGoogle()">Sign in with Google</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "svk-auth.firebaseapp.com",
            projectId: "svk-auth",
            storageBucket: "svk-auth.firebasestorage.app",
            messagingSenderId: "178863251618",
            appId: "1:178863251618:web:21f1f549a2f11f76d1f7fb",
            measurementId: "G-C5E85C5C09"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // 1. Automatically redirect if the user is already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "study.html";
            }
        });

        // 2. Handle the redirect result when coming back from Google login
        getRedirectResult(auth)
            .then((result) => {
                if (result) {
                    window.location.href = "study.html";
                }
            })
            .catch((error) => {
                console.error("Login Redirect Error: ", error.message);
                alert("Login failed: " + error.message);
            });

        // 3. Trigger Google Sign In
        window.loginWithGoogle = function() {
            signInWithRedirect(auth, provider);
        };
    </script>
</body>
</html>
