<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - 3SVK</title>
</head>
<body>
    <h2>Sign in to 3SVK</h2>
    <button onclick="loginWithGoogle()">Sign in with Google</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Your exact project config keys
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "3svk-auth.firebaseapp.com",
            projectId: "3svk-auth",
            storageBucket: "3svk-auth.firebasestorage.app",
            messagingSenderId: "178863251618",
            appId: "1:178863251618:web:21f1f549a2f11f76d1f7fb",
            measurementId: "G-C5G8G5G09"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.loginWithGoogle = function() {
            signInWithPopup(auth, provider)
                .then((result) => {
                    const user = result.user;
                    alert("Successfully logged in as: " + user.displayName);
                    window.location.href = "study.html";
                })
                .catch((error) => {
                    console.error("Login Error: ", error.message);
                    alert("Login failed: " + error.message);
                });
        };
    </script>
</body>
</html>
