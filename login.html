<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - 3SVK</title>
</head>
<body>
    <h2>Sign in to 3SVK</h2>
    <button onclick="loginWithGoogle()">Sign in with Google</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Firebase project configuration
        // Tip: For maximum security in open-source repos, consider loading these from a separate git-ignored config file.
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "svk-auth.firebaseapp.com",
            projectId: "svk-auth",
            storageBucket: "svk-auth.firebasestorage.app",
            messagingSenderId: "178863251618",
            appId: "1:178863251618:web:21f1f549a2f11f76d1f7fb",
            measurementId: "G-C5E85C5C09"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        getRedirectResult(auth)
            .then((result) => {
                if (result) {
                    const user = result.user;
                    alert("Successfully logged in as: " + user.displayName);
                    window.location.href = "study.html";
                }
            })
            .catch((error) => {
                console.error("Login Redirect Error: ", error.message);
                alert("Login failed: " + error.message);
            });

        window.loginWithGoogle = function() {
            signInWithRedirect(auth, provider);
        };
    </script>
</body>
</html>
